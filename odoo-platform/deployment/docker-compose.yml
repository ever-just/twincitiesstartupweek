version: '3.8'

services:
  odoo:
    image: odoo:17
    depends_on:
      - db
      - redis
    ports:
      - "8069:8069"
      - "8072:8072"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=tcsw_main
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - ODOO_ADMIN_PASSWD=admin
    volumes:
      - odoo-data:/var/lib/odoo
      - /mnt/ebs/filestore:/var/lib/odoo/filestore
      - /home/ubuntu/twincitiesstartupweek/odoo-platform/custom-modules:/mnt/extra-addons
    command: odoo --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=tcsw_main
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres-data:
  odoo-data:
